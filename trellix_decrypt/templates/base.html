<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Attachment Decrypt{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // Apply saved theme before paint to avoid a flash.
    (function () {
      var t = localStorage.getItem("theme")
        || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-mark">◆</span> Attachment Decrypt
    </a>
    <nav class="nav">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/settings" class="nav-link">Settings</a>
      <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">🌗</button>
      <a href="/logout" class="nav-link logout">Log out</a>
    </nav>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <script>
    document.getElementById("theme-toggle").addEventListener("click", function () {
      var cur = document.documentElement.getAttribute("data-theme");
      var next = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });
  </script>
  {% block scripts %}{% endblock %}
  <script src="/static/reveal.js"></script>
</body>
</html>
